<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - 3minsto9 Operations</title>
    <style>
      body {
        font-family: sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      h1 {
        color: #222;
        text-align: center;
        margin-bottom: 30px;
      }
      .container {
        background-color: #f9f9f9;
        padding: 40px;
        border-radius: 8px;
        border: 1px solid #ddd;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }
      input[type='text'],
      input[type='email'],
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-family: inherit;
      }
      textarea {
        resize: vertical;
        min-height: 120px;
      }
      button {
        background-color: #333;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
        font-weight: bold;
        transition: background-color 0.3s;
      }
      button:hover {
        background-color: #555;
      }
      input:focus,
      textarea:focus,
      button:focus {
        outline: 2px solid #333;
        outline-offset: 2px;
        border-color: #333;
      }

      .info-text {
        text-align: center;
        margin-top: 20px;
        font-size: 0.9em;
        color: #666;
      }

      @media (max-width: 600px) {
        body {
          padding: 20px 10px;
        }
        .container {
          padding: 20px;
        }
        h1 {
          font-size: 1.8rem;
        }
        button {
          font-size: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Contact Us</h1>

      <form
        action="#"
        method="POST"
        onsubmit="
          alert('Thank you for reaching out! We will get back to you shortly.');
          return false;
        "
      >
        <div class="form-group">
          <label for="name">Name <span aria-hidden="true" style="color: red">*</span></label>
          <input type="text" id="name" name="name" required autocomplete="name" maxlength="100" />
        </div>

        <div class="form-group">
          <label for="email"
            >Email Address <span aria-hidden="true" style="color: red">*</span></label
          >
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            maxlength="254"
          />
        </div>

        <div class="form-group">
          <label for="subject">Subject <span aria-hidden="true" style="color: red">*</span></label>
          <input type="text" id="subject" name="subject" required maxlength="150" />
        </div>

        <div class="form-group">
          <label for="message">Message <span aria-hidden="true" style="color: red">*</span></label>
          <textarea id="message" name="message" required maxlength="2000"></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>

      <p class="info-text">
        For press inquiries or technical support regarding the physical field guides, please allow
        2-3 business days for a response from our operations team.
      </p>
    </div>
  </body>
</html>
