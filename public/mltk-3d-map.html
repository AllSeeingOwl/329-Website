<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLTK 3D Vector Map Prototype</title>
    <meta name="robots" content="noindex" />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
        color: #00ff00;
        font-family: monospace;
      }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        pointer-events: none;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <div>MLTK VECTOR MAP SYSTEM v1.0</div>
      <div>STATUS: ONLINE</div>
      <div>MODE: WIREFRAME</div>
    </div>
    <div id="canvas-container"></div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <!-- The main logic script -->
    <script type="module" src="mltk_3d_map.js"></script>
  </body>
</html>
