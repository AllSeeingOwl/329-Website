<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLTK 3D Vector Map Prototype</title>
    <meta name="robots" content="noindex" />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
        color: #00ff00;
        font-family: monospace;
      }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        pointer-events: none;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #ui-controls {
        position: absolute;
        bottom: 20px;
        right: 20px;
        z-index: 20;
        display: none; /* Hidden by default on non-touch */
        flex-direction: row;
        gap: 20px;
        opacity: 0;
        transition: opacity 0.5s ease-in-out;
        pointer-events: none; /* Allow clicks to pass through when hidden */
      }
      #ui-controls.active {
        opacity: 1;
        pointer-events: auto;
      }
      .control-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }
      .control-row {
        display: flex;
        gap: 5px;
      }
      .map-btn {
        background-color: #000;
        color: #00ff00;
        border: 1px solid #00ff00;
        width: 40px;
        height: 40px;
        font-family: monospace;
        font-size: 16px;
        cursor: pointer;
        outline: none;
        user-select: none;
        -webkit-user-select: none;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .map-btn:active {
        background-color: #00ff00;
        color: #000;
      }
      .map-btn:focus-visible {
        outline: 2px dashed #00ff00;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <div>MLTK VECTOR MAP SYSTEM v1.0</div>
      <div>STATUS: ONLINE</div>
      <div>MODE: WIREFRAME</div>
    </div>
    <div id="canvas-container"></div>

    <div id="ui-controls" aria-hidden="true">
      <div class="control-group">
        <div class="control-row">
          <button class="map-btn" id="btn-rot-left" aria-label="Rotate Left">⟲</button>
          <button class="map-btn" id="btn-up" aria-label="Pan Up">↑</button>
          <button class="map-btn" id="btn-rot-right" aria-label="Rotate Right">⟳</button>
        </div>
        <div class="control-row">
          <button class="map-btn" id="btn-left" aria-label="Pan Left">←</button>
          <button class="map-btn" id="btn-down" aria-label="Pan Down">↓</button>
          <button class="map-btn" id="btn-right" aria-label="Pan Right">→</button>
        </div>
      </div>
      <div class="control-group" style="justify-content: center;">
        <button class="map-btn" id="btn-zoom-in" aria-label="Zoom In">+</button>
        <button class="map-btn" id="btn-zoom-out" aria-label="Zoom Out">-</button>
      </div>
    </div>


    <!-- Import Map for Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <!-- The main logic script -->
    <script type="module" src="mltk_3d_map.js"></script>
  </body>
</html>
