<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3minsto9 Operations - Maintenance</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Anton&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        background-color: #050505;
        color: #e0e0e0;
        font-family: 'Share Tech Mono', monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
      }

      /* Glitch effect overlay */
      body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.15) 0px,
          rgba(0, 0, 0, 0.15) 1px,
          transparent 1px,
          transparent 2px
        );
        pointer-events: none;
        z-index: 10;
      }

      .container {
        text-align: center;
        z-index: 5;
        max-width: 800px;
        padding: 20px;
      }

      .main-title {
        font-family: 'Anton', sans-serif;
        font-size: 4rem;
        color: #ffffff;
        letter-spacing: 5px;
        text-transform: uppercase;
        margin-bottom: 10px;
        text-shadow:
          2px 2px 0px rgba(255, 165, 0, 0.5),
          -2px -2px 0px rgba(0, 255, 255, 0.5);
        animation: text-glitch 3s infinite;
      }

      .subtitle {
        font-size: 1.5rem;
        color: #ffa500;
        margin-bottom: 30px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .message-box {
        background-color: #111;
        border: 1px solid #333;
        border-left: 4px solid #ffa500;
        padding: 30px;
        margin-top: 20px;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      .message-text {
        font-size: 1.1rem;
        color: #bbb;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .status-line {
        font-size: 0.9rem;
        color: #888;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .blinking-dot {
        width: 10px;
        height: 10px;
        background-color: #ffa500;
        border-radius: 50%;
        display: inline-block;
        animation: blink 1.5s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* Subtle text glitch animation */
      @keyframes text-glitch {
        0% {
          text-shadow:
            2px 2px 0px rgba(255, 165, 0, 0.5),
            -2px -2px 0px rgba(0, 255, 255, 0.5);
        }
        5% {
          text-shadow:
            -2px 1px 0px rgba(255, 165, 0, 0.5),
            2px -1px 0px rgba(0, 255, 255, 0.5);
        }
        10% {
          text-shadow:
            2px 2px 0px rgba(255, 165, 0, 0.5),
            -2px -2px 0px rgba(0, 255, 255, 0.5);
        }
        100% {
          text-shadow:
            2px 2px 0px rgba(255, 165, 0, 0.5),
            -2px -2px 0px rgba(0, 255, 255, 0.5);
        }
      }

      .footer-links {
        margin-top: 50px;
        font-size: 0.8rem;
        color: #555;
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      .footer-links a {
        color: #555;
        text-decoration: none;
        transition: color 0.2s;
      }

      .footer-links a:hover {
        color: #fff;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="main-title">3minsto9</div>
      <div class="subtitle">SYSTEM MAINTENANCE</div>

      <div class="message-box">
        <div class="message-text">
          The 3minsto9 portal and all associated systems are currently offline for scheduled
          maintenance and vital upgrades.
          <br /><br />
          We apologize for the interruption. Please stand by, connections will be restored shortly.
        </div>

        <div class="status-line">
          <span class="blinking-dot"></span>
          <span>RECALIBRATING SYSTEMS... PLEASE WAIT</span>
        </div>
      </div>

      <div class="footer-links">
        <a href="Studio%20Contact%20Us.html">Contact Us</a>
      </div>
    </div>
  </body>
</html>
