<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARG Progress // NEURAL LINK</title>
    <link rel="icon" type="image/svg+xml" href="/mltk-favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --mltk-green: #00ff00;
        --bg-color: #050505;
        --rabbit-red: #ff3366;
      }
      body {
        background-color: var(--bg-color);
        color: var(--mltk-green);
        font-family: 'Share Tech Mono', monospace;
        margin: 0;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .dashboard-container {
        max-width: 800px;
        width: 100%;
        border: 1px solid var(--mltk-green);
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
      }
      h1 {
        text-transform: uppercase;
        border-bottom: 1px solid var(--mltk-green);
        padding-bottom: 10px;
        text-align: center;
        letter-spacing: 2px;
      }
      .node-list {
        list-style: none;
        padding: 0;
        margin-top: 30px;
      }
      .node-item {
        display: flex;
        justify-content: space-between;
        padding: 15px;
        border-bottom: 1px dashed rgba(0, 255, 0, 0.3);
        transition: background-color 0.2s ease;
      }
      .node-item:hover {
        background-color: rgba(0, 255, 0, 0.05);
      }
      .node-name {
        font-size: 18px;
        text-transform: uppercase;
      }
      .node-status {
        font-weight: bold;
      }
      .status-locked {
        color: #555;
      }
      .status-unlocked {
        color: var(--mltk-green);
      }
      .status-hacked {
        color: var(--rabbit-red);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
      .btn {
        display: inline-block;
        margin-top: 30px;
        padding: 10px 20px;
        border: 1px solid var(--mltk-green);
        background: transparent;
        color: var(--mltk-green);
        text-decoration: none;
        text-transform: uppercase;
        cursor: pointer;
      }
      .btn:hover {
        background: var(--mltk-green);
        color: var(--bg-color);
      }
      .disclaimer {
        margin-top: 20px;
        font-size: 12px;
        color: #888;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="dashboard-container">
      <h1>Neural Link Progress</h1>

      <ul class="node-list" id="nodes">
        <!-- Injected via JS -->
      </ul>

      <div style="text-align: center">
        <button class="btn" id="reset-btn">Purge Local Memory</button>
      </div>

      <div class="disclaimer">
        Progress is saved locally on this terminal via localStorage. Clearing browser data will
        reset this terminal.
      </div>
    </div>

    <script>
      // Define the nodes in the ARG
      const argNodes = [
        {
          id: 'node_mltk_login',
          name: 'MLTK Login Gate',
          check: () => localStorage.getItem('mltk_auth_success') === 'true',
        },
        {
          id: 'node_velvet_rope',
          name: 'Velvet Rope Protocol',
          check: () => localStorage.getItem('velvet_rope_unlocked') === 'true',
        },
        {
          id: 'node_radio_scanner',
          name: 'Radio Frequency Intercept (104.9)',
          check: () => localStorage.getItem('radio_intercepted') === 'true',
        },
        {
          id: 'node_rabbit_hack',
          name: 'Team Rabbit Mainframe Hack',
          check: () => localStorage.getItem('rabbit_hack_completed') === 'true',
        },
      ];

      // Since we just added the Team Rabbit Hack page, we need to update it to set the localStorage flag when completed.
      // We will do that in the next step, but for now we set up the dashboard to look for it.

      function renderNodes() {
        const list = document.getElementById('nodes');
        list.innerHTML = '';

        argNodes.forEach((node) => {
          const isUnlocked = node.check();
          let statusClass = 'status-locked';
          let statusText = '[ LOCKED ]';

          if (isUnlocked) {
            statusClass = node.id === 'node_rabbit_hack' ? 'status-hacked' : 'status-unlocked';
            statusText = node.id === 'node_rabbit_hack' ? '[ HACKED ]' : '[ DECRYPTED ]';
          }

          const li = document.createElement('li');
          li.className = 'node-item';
          li.innerHTML = `
            <span class="node-name">${node.name}</span>
            <span class="node-status ${statusClass}">${statusText}</span>
          `;
          list.appendChild(li);
        });
      }

      document.getElementById('reset-btn').addEventListener('click', () => {
        if (confirm('Are you sure you want to purge all local neural link data?')) {
          localStorage.removeItem('mltk_auth_success');
          localStorage.removeItem('velvet_rope_unlocked');
          localStorage.removeItem('radio_intercepted');
          localStorage.removeItem('rabbit_hack_completed');
          renderNodes();
        }
      });

      renderNodes();
    </script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
