<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYSTEM TIMER // MLTK MAINFRAME</title>
    <!-- Importing Gretchen's corporate font from the Master Font Sheet -->
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000000;
        color: #ff0000; /* Glowing red */
        font-family: 'VT323', monospace;
        text-shadow:
          0 0 10px rgba(255, 0, 0, 0.8),
          0 0 20px rgba(255, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* CRT Overlay Effect */
      body::before {
        content: ' ';
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.06),
            rgba(0, 255, 0, 0.02),
            rgba(0, 0, 255, 0.06)
          );
        z-index: 9998;
        background-size:
          100% 2px,
          3px 100%;
        pointer-events: none;
      }

      body::after {
        content: ' ';
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9);
        border-radius: 20px;
        z-index: 9999;
        pointer-events: none;
        animation: crt-flicker 0.15s infinite;
      }

      @keyframes crt-flicker {
        0% {
          opacity: 0.95;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.95;
        }
      }

      #clock-container {
        font-size: 20vw; /* Responsive huge size */
        line-height: 1;
        text-align: center;
        z-index: 10;
        user-select: none;
      }

      /* The white flash element */
      #flash-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        z-index: 10000; /* Above CRT effects */
        opacity: 0;
        pointer-events: none; /* Ignore clicks */
        transition: opacity 0.1s ease-out; /* Fast fade out */
      }

      .flash-active {
        opacity: 1 !important;
        transition: none !important; /* Instant appear */
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
    <script src="/app.js"></script>
  <link rel="manifest" href="/manifest.json">
</head>
  <body>
    <div id="flash-overlay"></div>
    <div id="clock-container">03:00</div>

    <script>
      const clockElement = document.getElementById('clock-container');
      const flashOverlay = document.getElementById('flash-overlay');

      const INITIAL_TIME = 3 * 60; // 3 minutes in seconds
      let timeLeft = INITIAL_TIME;
      let timerInterval;

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }

      function updateClockDisplay() {
        clockElement.textContent = formatTime(timeLeft);
      }

      function triggerFlash() {
        // Instant white
        flashOverlay.classList.add('flash-active');

        // Short delay, then fade out
        setTimeout(() => {
          flashOverlay.classList.remove('flash-active');
        }, 50); // 50ms flash duration
      }

      function tick() {
        timeLeft--;

        if (timeLeft < 0) {
          triggerFlash();
          timeLeft = INITIAL_TIME;
        }

        updateClockDisplay();
      }

      function startTimer() {
        updateClockDisplay();
        timerInterval = setInterval(tick, 1000);
      }

      // Start the countdown when page loads
      document.addEventListener('DOMContentLoaded', startTimer);
    </script>
  </body>
</html>
