<!doctype html>
<html lang="en">
  <head>
    <meta name="robots" content="noindex" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLTK // SURVEILLANCE DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000000;
        color: #00ff00;
        font-family: 'VT323', monospace;
        text-shadow: 0 0 5px rgba(0, 255, 0, 0.7);
        overflow-x: hidden;
        overflow-y: auto;
      }

      header {
        text-align: center;
        padding: 20px;
        border-bottom: 2px solid #00ff00;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      h1 {
        margin: 0;
        font-size: 2.5rem;
      }

      h2 {
        margin: 5px 0 0 0;
        font-size: 1.2rem;
        color: #888;
        text-shadow: none;
      }

      /* CSS Grid Layout for Dashboard */
      .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        padding: 0 40px 40px 40px;
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
        z-index: 5;
      }

      /* Square Cards */
      .card {
        aspect-ratio: 1 / 1;
        border: 2px solid #555;
        background-color: rgba(20, 20, 20, 0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 10px;
        box-sizing: border-box;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .card-title {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      .card-status {
        font-size: 1.2rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .card-id {
        position: absolute;
        top: 5px;
        left: 5px;
        font-size: 0.8rem;
        color: #666;
        font-family: 'Share Tech Mono', monospace;
      }

      /* Active Glow (Green) */
      .card.active {
        border-color: #00ff00;
        color: #00ff00;
        box-shadow:
          0 0 15px rgba(0, 255, 0, 0.3),
          inset 0 0 10px rgba(0, 255, 0, 0.2);
        text-shadow: 0 0 5px rgba(0, 255, 0, 0.8);
      }

      .card.active .card-id {
        color: #00aa00;
      }

      /* Offline Glow (Red) */
      .card.offline {
        border-color: #ff003c;
        color: #ff003c;
        box-shadow:
          0 0 15px rgba(255, 0, 60, 0.3),
          inset 0 0 10px rgba(255, 0, 60, 0.2);
        text-shadow: 0 0 5px rgba(255, 0, 60, 0.8);
      }

      .card.offline .card-id {
        color: #aa0028;
      }

      /* Static/Noise Overlay */
      .static-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 9997;
        opacity: 0.05;
        background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
      }

      /* Focus styles for interactive cards */
      a.card:focus-visible {
        outline: none;
      }
      a.card.active:focus-visible {
        box-shadow:
          0 0 25px rgba(0, 255, 0, 0.6),
          inset 0 0 15px rgba(0, 255, 0, 0.4);
        border-color: #00ff00;
        background-color: rgba(0, 255, 0, 0.1);
      }
      a.card.offline:focus-visible {
        box-shadow:
          0 0 25px rgba(255, 0, 60, 0.6),
          inset 0 0 15px rgba(255, 0, 60, 0.4);
        border-color: #ff003c;
        background-color: rgba(255, 0, 60, 0.1);
      }

      /* CRT Overlay Effect */
      body::before {
        content: ' ';
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.06),
            rgba(0, 255, 0, 0.02),
            rgba(0, 0, 255, 0.06)
          );
        z-index: 9998;
        background-size:
          100% 2px,
          3px 100%;
        pointer-events: none;
      }

      body::after {
        content: ' ';
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9);
        border-radius: 20px;
        z-index: 9999;
        pointer-events: none;
        animation: crt-flicker 0.15s infinite;
      }

      @keyframes crt-flicker {
        0% {
          opacity: 0.95;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.95;
        }
      }

      /* Admin Panel Styles */
      .admin-panel {
        max-width: 1200px;
        margin: 0 auto 30px auto;
        padding: 20px;
        border: 1px solid #555;
        background-color: rgba(10, 10, 10, 0.9);
        position: relative;
        z-index: 6;
      }

      .admin-panel-title {
        font-size: 1.5rem;
        margin-top: 0;
        margin-bottom: 15px;
        border-bottom: 1px dashed #555;
        padding-bottom: 5px;
      }

      .admin-controls {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 10px;
      }

      .admin-control-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 10px;
        background-color: rgba(20, 20, 20, 0.8);
        border: 1px solid #333;
      }

      .admin-control-label {
        font-size: 1.1rem;
      }

      /* Switch Styles */
      .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 24px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ff003c; /* Offline */
        transition: 0.3s;
        border: 1px solid #555;
      }

      .slider:before {
        position: absolute;
        content: '';
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.3s;
      }

      input:checked + .slider {
        background-color: #00ff00; /* Active */
      }

      input:focus-visible + .slider {
        outline: 2px solid white;
        outline-offset: 2px;
      }

      input:checked + .slider:before {
        transform: translateX(26px);
      }

      .reset-btn {
        margin-top: 20px;
        background-color: transparent;
        color: #00ff00;
        border: 1px solid #00ff00;
        padding: 5px 15px;
        font-family: 'VT323', monospace;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .reset-btn:hover,
      .reset-btn:focus-visible {
        background-color: #00ff00;
        color: #000;
      }

      @media (max-width: 600px) {
        .dashboard {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          padding: 0 20px 20px 20px;
          gap: 15px;
        }
        h1 {
          font-size: 1.8rem;
        }
        .card-title {
          font-size: 1.2rem;
        }
        .card-status {
          font-size: 1rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
    <script type="module" src="/app.js"></script>
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div class="static-overlay"></div>
    <header>
      <h1>MLTK Global Surveillance</h1>
      <h2>Authorized Personnel Only // Tracker Network v4.2</h2>
      <div style="margin-top: 15px">
        <a
          href="mltk-login-gate.html"
          style="
            color: #00ff00;
            text-decoration: underline;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
          "
          >&lt;&lt; RETURN TO DASHBOARD</a
        >
      </div>
    </header>

    <div class="dashboard" id="dashboard-container">
      <!-- Cards will be dynamically injected here via JS -->
    </div>

    <script>
      let dashboardConfig = [];

      // Function to fetch config from the backend
      async function fetchDashboardConfig() {
        try {
          const response = await fetch('/api/dashboard-config');
          if (response.ok) {
            dashboardConfig = await response.json();
            renderDashboard();
          } else {
            console.error('Failed to fetch dashboard config');
          }
        } catch (error) {
          console.error('Error fetching dashboard config:', error);
        }
      }

      // Function to render the dashboard based on the configuration
      function renderDashboard() {
        const container = document.getElementById('dashboard-container');
        container.innerHTML = ''; // Clear current contents

        dashboardConfig.forEach((item) => {
          const isOffline = item.status === 'offline';
          const cardEl = isOffline ? document.createElement('div') : document.createElement('a');

          cardEl.className = `card ${isOffline ? 'offline' : 'active'}`;
          cardEl.style.textDecoration = 'none';
          cardEl.style.outline = 'none';
          cardEl.style.display = 'flex';

          if (!isOffline) {
            cardEl.href = item.link;
            cardEl.tabIndex = 0;
            cardEl.role = 'link';
            if (item.isDownload) {
              cardEl.download = '';
            }
          }

          const idEl = document.createElement('span');
          idEl.className = 'card-id';
          idEl.textContent = item.id;

          const titleEl = document.createElement('div');
          titleEl.className = 'card-title';
          titleEl.textContent = item.title;

          const statusEl = document.createElement('div');
          statusEl.className = 'card-status';
          statusEl.textContent = isOffline ? '[OFFLINE]' : `[${item.type}]`;

          cardEl.appendChild(idEl);
          cardEl.appendChild(titleEl);
          cardEl.appendChild(statusEl);

          container.appendChild(cardEl);
        });
      }

      // Initial render
      document.addEventListener('DOMContentLoaded', () => {
        fetchDashboardConfig();
      });
    </script>
  </body>
</html>
